{% set name = "pysgn" %}
{% set version = "0.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pysgn-{{ version }}.tar.gz
  sha256: 103fd0dbf170d268b9c46e3201183c0198d41587ebfe73ba1e0c7b9ac6d2518e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - pandas
    - geopandas
    - networkx
    - scikit-learn
    - scipy
    - loguru
    - tqdm

test:
  imports:
    - pysgn
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pysgn.readthedocs.io
  summary: A Python package for constructing synthetic geospatial networks
  dev_url: https://github.com/wang-boyu/pysgn
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - wang-boyu
